<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lime</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #2b0b30, #5c0f1e);
            height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .container {
            display: flex;
            flex: 1;
        }
        .sidebar {
            width: 200px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 20px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }
        .sidebar li:hover {
            color: #d4a5d4;
        }
        .content {
            flex: 1;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="top-bar">Lime</div>
    <div class="container">
        <div class="sidebar">
            <ul>
                <li>Ana sayfa</li>
                <li>Hakkımda</li>
                <li>Projeler</li>
                <li>İletişim</li>
            </ul>
        </div>
        <div class="content">
            <h2>Hoş geldin...</h2>
            <p>Buralar şimdilik dutluk.</p>
        </div>
    </div>
</body>
</html>
